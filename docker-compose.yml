services:
  psono:
    image: psono/psono-server:latest
    ports:
      - "10100:10100"
    depends_on:
      - db
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: psono
      POSTGRES_USER: psono
      POSTGRES_PASSWORD: psono
    volumes:
      - db_data:/var/lib/postgresql/data
volumes:
  db_data:
