services:
  psono:
    image: psono/psono-server:latest
    ports:
      - "10100:10100"
    depends_on:
      - db
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=${POSTGRES_DB:-psono}
      - POSTGRES_USER=${POSTGRES_USER:-psono}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env}
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-psono}
      POSTGRES_USER: ${POSTGRES_USER:-psono}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - db_data:/var/lib/postgresql/data
volumes:
  db_data:
